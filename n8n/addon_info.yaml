source:
  type: github-releases
  repo: n8n-io/n8n
  current_version: n8n@2.29.10
  version_template: regex:^n8n(?:@|%40)(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$
config:
  version_template: "{{major}}.{{minor}}.{{patch}}"
  patch: 0
  image: fabioogaravini/hassio-n8n
build:
  image: ghcr.io/n8n-io/n8n
  version_template: "{{major}}.{{minor}}.{{patch}}"
changelog:
  source: github-releases
  repo: n8n-io/n8n
  version_template: n8n@{{major}}.{{minor}}.{{patch}}
test:
  enable: true
