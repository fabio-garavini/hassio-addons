source:
  type: docker
  repo: ghcr.io/imagegenius/immich
  current_version: 3.0.3-openvino
  version_template: regex:^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)-openvino$
config:
  version_template: "{{major}}.{{minor}}.{{patch}}"
  patch: 0
  image: fabioogaravini/hassio-immich-openvino
build:
  image: ghcr.io/imagegenius/immich
  version_template: "{{major}}.{{minor}}.{{patch}}-openvino"
changelog:
  source: github-releases
  repo: immich-app/immich
  version_template: v{{major}}.{{minor}}.{{patch}}
test:
  enable: true
