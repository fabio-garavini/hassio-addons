name: redis-aarch64
services:
  redis-aarch64:
    image: fabioogaravini/hassio-redis-stack:${VERSION:-latest}-aarch64
    build:
      context: ..
      args:
        BUILD_ARCH: aarch64
        BUILD_VERSION: ${VERSION:-latest}
    container_name: redis-aarch64
    ports:
      - 6379:6379
      - 8001:8001
      - 9121:9121
    volumes:
      - data:/data
      - ./options.json:/data/options.json:ro
      - config:/config
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  data:
  config: