name: luanti-amd64
services:
  luanti-amd64:
    image: fabioogaravini/hassio-luanti:${VERSION:-latest}-amd64
    build:
      context: ..
      args:
        BUILD_ARCH: amd64
        BUILD_VERSION: ${VERSION:-latest}
    container_name: luanti-amd64
    ports:
      - "30000:30000/udp"
    volumes:
      - data:/data
      - ./options.json:/data/options.json:ro
      - config:/config
      - ssl:/ssl
    healthcheck:
      test: ["CMD-SHELL", "pgrep luantiserver || pgrep minetestserver || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  data:
  config:
  ssl: