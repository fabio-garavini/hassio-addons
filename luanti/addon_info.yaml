source:
  type: github-releases
  repo: linuxserver/docker-luanti
  current_version: 5.15.2-ls36
  version_template: regex:^v(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)-ls(?<build>\d+)$
config:
  version_template: "{{major}}.{{minor}}.{{patch}}"
  patch: 2
  image: fabioogaravini/hassio-luanti
build:
  image: ghcr.io/linuxserver/luanti
  version_template: v{{major}}.{{minor}}.{{patch}}-ls{{build}}
changelog:
  source: github-releases
  repo: luanti-org/luanti
  version_template: "{{major}}.{{minor}}.{{patch}}"
test:
  enable: true
