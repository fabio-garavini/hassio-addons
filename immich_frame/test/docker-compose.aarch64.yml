name: immich_frame-aarch64
services:
  immich_frame-aarch64:
    image: fabioogaravini/hassio-immich-frame:${VERSION:-latest}-aarch64
    build:
      context: ..
      args:
        BUILD_ARCH: amd64
        BUILD_VERSION: ${VERSION:-latest}
    container_name: immich_frame-aarch64
    depends_on:
      immich:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      - TZ=Etc/UTC
    volumes:
      - data:/data
      - ./options.json:/data/options.json:ro
      - ssl:/ssl
    healthcheck:
      test: ["CMD-SHELL", "curl -kf http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  immich:
    image: fabioogaravini/hassio-immich:latest-aarch64
    container_name: immich-aarch64
    ports:
      - 2283:8080
    environment:
      - TZ=Etc/UTC
    volumes:
      - immich-data:/data
      - ./immich-options.json:/data/options.json:ro
      - immich-config:/config
      - ssl:/ssl
      - media:/media
      - share:/share
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://127.0.0.1:8080/api/server/ping | jq -e '.res == \"pong\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  data:
  immich-data:
  immich-config:
  share:
  media:
  ssl:
