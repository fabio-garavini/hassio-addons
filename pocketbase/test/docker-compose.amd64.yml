name: pocketbase-amd64
services:
  pocketbase-amd64:
    image: fabioogaravini/hassio-pocketbase:${VERSION:-latest}-amd64
    build:
      context: ..
      args:
        BUILD_ARCH: amd64
        BUILD_VERSION: ${VERSION:-latest}
    container_name: pocketbase-amd64
    ports:
      - 8090:8090
    environment:
      - TZ=Etc/UTC
    volumes:
      - data:/data
      - ./options.json:/data/options.json:ro
      - config:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -sk http://127.0.0.1:8090/api/health | jq -e '.code == 200'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  data:
  config: