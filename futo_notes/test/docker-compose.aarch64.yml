name: futo-notes-aarch64
services:
  futo-notes-aarch64:
    image: fabioogaravini/hassio-futo_notes:${VERSION:-latest}-aarch64
    build:
      context: ..
      args:
        BUILD_ARCH: aarch64
        BUILD_VERSION: ${VERSION:-latest}
    container_name: futo-notes-aarch64
    ports:
      - 3005:8080
    environment:
      - TZ=Etc/UTC
    volumes:
      - data:/data
      - ./options.json:/data/options.json:ro
      - config:/config
      - ssl:/ssl
      - share:/share
    healthcheck:
      test: ["CMD-SHELL", "curl -fk http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  data:
  config:
  ssl:
  share:
