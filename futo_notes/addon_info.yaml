source:
  type: gitlab-releases
  repo: futo-notes/futo-notes-server
  current_version: 0.5.1
  version_template: regex:^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$
config:
  version_template: "{{major}}.{{minor}}.{{patch}}"
  patch: 0
  image: fabioogaravini/hassio-futo_notes
build:
  image: oven/bun
  version_template: "alpine"
test:
  enable: true
