name: FUTO Notes (Server)
version: 0.5.1
slug: futo_notes
description: Self-hosted end-to-end encrypted sync server for FUTO Notes
url: https://notes.futo.tech
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
  - type: ssl
backup: cold
backup_exclude:
  - "**/logs"
schema:
  FUTO_NOTES_PASSWORD: password
  TRUST_PROXY: bool
  AUTH_RATE_LIMIT: int(0,)?
  AUTH_RATE_LIMIT_WINDOW_MS: int(1,)?
  MAX_BLOB_BYTES: int(1,)?
  BLOB_RETENTION_DAYS: int(1,)?
  ssl: bool
  certfile: str?
  keyfile: str?
options:
  TRUST_PROXY: true
  ssl: true
  certfile: fullchain.pem
  keyfile: privkey.pem
ports:
  8080/tcp: 3005
ports_description:
  8080/tcp: FUTO Notes sync server
image: fabioogaravini/hassio-futo_notes
